version: '3.8'
services:
  analysis-engine:
    build: ./analysis-engine
    ports:
      - "8080:8080"
    networks:
      - backport-net

  orchestrator:
    build: ./agents-backend
    environment:
      - MCP_SERVER_URL=http://analysis-engine:8080/mcp/sse
    depends_on:
      - analysis-engine
    networks:
      - backport-net

networks:
  backport-net:
    driver: bridge